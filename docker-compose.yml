version: '3.8'

services:
  # 1. 資料庫服務 (Microsoft SQL Server)
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eip-database
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: always

  # 2. 後端 API 服務 (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eip-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://database:1433;databaseName=EIP_DB;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=YourStrongPassword123
      - APP_STORAGE_CONNECTION-STRING=local:/app/uploads
      - APP_STORAGE_LOCAL-DIR=/app/uploads
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    depends_on:
      - database
    restart: always

  # 3. 前端 SPA 服務 (Vue 3 + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eip-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  mssql_data:
