server.port=8080

# Spring Data JPA / Microsoft SQL Server 連線設定
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=EIP;encrypt=true;trustServerCertificate=true
spring.datasource.username=owner
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate DDL 設定 (規格書要求手動建表，因此設為 none)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# 檔案上傳限制設定 (單檔 2MB，防範記憶體卡死)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=10MB

# 日誌設定 (輸出至 Console 與 logs/eip-backend.log)
logging.level.com.eip=INFO
logging.file.name=logs/eip-backend.log
# 每日滾動、最大 10MB 自動壓縮
logging.logback.rollingpolicy.file-name-pattern=logs/eip-backend-%d{yyyy-MM-dd}.%i.log.gz
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.total-size-cap=100MB

# 動態簽核系統儲存體設定
# 格式為 local:<路徑> 或 Azure 標準連線字串 (如 DefaultEndpointsProtocol=https;AccountName=...)
app.storage.connection-string=local:c:/servlet/EIP/uploads
app.storage.container-name=eipattachments
# 當連線字串為 local 時實體存放之目錄路徑
app.storage.local-dir=c:/servlet/EIP/uploads
